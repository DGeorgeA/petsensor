    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "name": "Sense My Pet",
          "url": "https://sensemypet.com/",

          "featureList": [
            "On-device audio stress screening for dogs and cats",
            "On-device camera behavioural screening",
            "Separate Stress Signal Index and observation confidence",
            "Evidence-based Vet+ escalation",
            "No raw audio or video uploaded"
          ]
        },
        {
          "@type": "Organization",
          "name": "Sense My Pet",
          "url": "https://sensemypet.com/",
          "logo": "https://sensemypet.com/favicon.svg"
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Can an app tell if my dog or cat is anxious?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sense My Pet screens for observable stress and anxiety-related patterns in your pet's sounds and body language and gives a cautious Stress Signal Index. It is a wellness screening, not a veterinary diagnosis — persistent or concerning signs should be reviewed by a qualified veterinarian."

            },
            {
              "@type": "Question",
              "name": "Is my pet's audio and video uploaded anywhere?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. All analysis runs on your device. Raw audio and video are processed locally for the active scan and are never stored on our servers."
              }
            },
            {
              "@type": "Question",
              "name": "Which pets are supported?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sense My Pet currently supports dogs and cats."
              }
            }
          ]
        }
      ]
    }
